<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f1ea" />
    <title>我的衣橱</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="pageEyebrow">本地衣橱</p>
          <h1 id="pageTitle">我的衣橱</h1>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="settingsBtn" type="button" title="设置">⚙</button>
          <button class="primary-icon" id="addGarmentBtn" type="button" title="新增衣物">＋</button>
        </div>
      </header>

      <main>
        <section class="page active" id="closetPage" aria-label="衣橱">
          <div class="segmented">
            <button class="selected" data-filter-mode="category" type="button">按种类</button>
            <button data-filter-mode="location" type="button">按柜子</button>
          </div>
          <label class="search-box">
            <span>搜索</span>
            <input id="closetSearch" type="search" placeholder="名称、颜色、风格、备注" />
          </label>
          <div class="chip-row" id="closetFilterChips"></div>
          <div class="empty-state" id="closetEmpty">
            <strong>还没有衣物</strong>
            <span>点右上角 “＋” 添加第一件。</span>
          </div>
          <div class="garment-grid" id="garmentGrid"></div>
        </section>

        <section class="page" id="dressPage" aria-label="换装">
          <div class="dress-toolbar">
            <button id="changeMannequinBtn" type="button">更换人体图</button>
            <button id="saveCanvasBtn" type="button">保存搭配</button>
          </div>
          <input id="mannequinInput" class="hidden-input" type="file" accept="image/*" />

          <div class="stage-wrap">
            <div class="stage" id="stage">
              <div class="mannequin-placeholder" id="mannequinPlaceholder">上传人体图</div>
              <img id="mannequinImage" class="mannequin hidden" alt="人体图" />
              <div id="layerHost"></div>
            </div>
          </div>

          <div class="transform-panel" id="transformPanel">
            <div>
              <strong id="selectedLayerName">未选择衣物</strong>
              <span id="selectedLayerHint">点选已穿上的衣物后可调整</span>
            </div>
            <label>
              大小
              <input id="scaleRange" type="range" min="0.2" max="3" step="0.02" value="1" />
            </label>
            <label>
              旋转
              <input id="rotateRange" type="range" min="-180" max="180" step="1" value="0" />
            </label>
            <button id="removeLayerBtn" type="button">移除当前图层</button>
          </div>

          <div class="chip-row dress-cats" id="dressCategoryChips"></div>
          <div class="shelf" id="dressShelf"></div>
          <div class="dress-actions">
            <button id="clearLayersBtn" type="button">清空</button>
            <button id="undoBtn" type="button">撤销</button>
            <button id="saveOutfitBtn" type="button">保存搭配</button>
          </div>
        </section>

        <section class="page" id="outfitsPage" aria-label="搭配">
          <label class="search-box">
            <span>搜索</span>
            <input id="outfitSearch" type="search" placeholder="搭配名称、衣物名称" />
          </label>
          <div class="empty-state" id="outfitsEmpty">
            <strong>还没有搭配</strong>
            <span>去换装页保存一套搭配。</span>
          </div>
          <div class="outfit-list" id="outfitList"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="active" data-page="closet" type="button">衣橱</button>
        <button data-page="dress" type="button">换装</button>
        <button data-page="outfits" type="button">搭配</button>
      </nav>
    </div>

    <dialog id="garmentDialog" class="sheet">
      <form method="dialog" id="garmentForm">
        <header>
          <h2 id="garmentFormTitle">新增衣物</h2>
          <button class="ghost" value="cancel" type="button" data-close-dialog="garmentDialog">关闭</button>
        </header>
        <input id="garmentId" type="hidden" />
        <label class="upload-box" for="garmentImageInput">
          <img id="garmentPreview" class="hidden" alt="衣物预览" />
          <span id="garmentUploadText">上传图片 / 拍照</span>
          <input id="garmentImageInput" type="file" accept="image/*" />
        </label>
        <label>名称<input id="garmentName" required placeholder="例如 白色短袖" /></label>
        <label>种类<select id="garmentCategory" required></select></label>
        <label>
          柜子位置
          <input id="garmentLocation" list="locationOptions" placeholder="输入或选择位置" />
          <datalist id="locationOptions"></datalist>
        </label>
        <label>颜色<input id="garmentColors" placeholder="例如 白色、黑色" /></label>
        <label>季节<input id="garmentSeasons" placeholder="例如 春、夏" /></label>
        <label>风格<input id="garmentStyles" placeholder="例如 通勤、休闲" /></label>
        <label>备注<textarea id="garmentNotes" rows="3" placeholder="材质、搭配想法、购买信息等"></textarea></label>
        <button class="primary-wide" id="saveGarmentBtn" type="submit">保存衣物</button>
      </form>
    </dialog>

    <dialog id="detailDialog" class="sheet">
      <div class="detail-view">
        <header>
          <h2 id="detailName">衣物详情</h2>
          <button class="ghost" type="button" data-close-dialog="detailDialog">关闭</button>
        </header>
        <img id="detailImage" alt="衣物大图" />
        <dl id="detailFields"></dl>
        <div class="button-row">
          <button id="detailEditBtn" type="button">编辑</button>
          <button id="detailDressBtn" type="button">加入换装</button>
          <button class="danger" id="detailDeleteBtn" type="button">删除衣物</button>
        </div>
      </div>
    </dialog>

    <dialog id="settingsDialog" class="sheet">
      <div>
        <header>
          <h2>设置</h2>
          <button class="ghost" type="button" data-close-dialog="settingsDialog">关闭</button>
        </header>
        <div class="settings-list">
          <button id="manageLocationsBtn" type="button">管理柜子位置</button>
          <button id="exportBtn" type="button">导出备份</button>
          <button id="importBtn" type="button">导入备份</button>
          <button class="danger" id="clearAllBtn" type="button">清空全部数据</button>
        </div>
        <input id="importInput" class="hidden-input" type="file" accept="application/json,.json" />
      </div>
    </dialog>

    <dialog id="locationsDialog" class="sheet">
      <div>
        <header>
          <h2>柜子位置</h2>
          <button class="ghost" type="button" data-close-dialog="locationsDialog">关闭</button>
        </header>
        <form id="locationForm" class="inline-form">
          <input id="newLocationName" placeholder="新增位置名称" />
          <button type="submit">添加</button>
        </form>
        <div id="locationList" class="location-list"></div>
      </div>
    </dialog>

    <dialog id="outfitNameDialog" class="sheet mini-sheet">
      <form method="dialog" id="outfitNameForm">
        <header>
          <h2>保存搭配</h2>
          <button class="ghost" type="button" data-close-dialog="outfitNameDialog">关闭</button>
        </header>
        <label>搭配名称<input id="outfitNameInput" required placeholder="例如 今日通勤" /></label>
        <button class="primary-wide" type="submit">保存</button>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
